<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<button class="theme-btn" id="themeToggle">🌙</button>

<div class="form-container">
  <h2>Login</h2>

  <form id="loginForm">

    <div class="input-box">
      <input type="text" id="username" required placeholder=" ">
      <span>Username</span>
    </div>

    <div class="input-box password-box">
      <input type="password" id="password" required placeholder=" ">
      <span>Password</span>
      <i class="eye" id="togglePassword">👁</i>
    </div>

    <button class="submit-btn" type="submit">Login</button>
    <p>For Registrations</p>
    <a href="file:///M:/HTML/prince/register.html" target="_blank">click here</a>
  </form>
</div>

<script src="login.js"></script>
</body>
</html>
